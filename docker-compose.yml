services:
  fastapi:
    build: .
    ports:
      - 8000:8000
    volumes:
      - .:/app
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  
  redis:
    image: redis:8.6.1-alpine
    ports: 
      - 6379:6379
    volumes:
      - redis_data:/data
    command: redis-server

volumes:
  redis_data: